<script>
async function update() {
  const res = await fetch("https://xxxxx-default-rtdb.firebaseio.com/stops.json");
  const data = await res.json();

  let text = "";

  for (let stop in data) {
    text += stop + " → " + data[stop].busName + "<br>";
  }

  document.getElementById("output").innerHTML = text;
}

setInterval(update, 1000);
</script>

<div id="output">読み込み中...</div>
